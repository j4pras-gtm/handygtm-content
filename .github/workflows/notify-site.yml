name: Notify site to rebuild

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger handygtm-site rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          # Create a GitHub Personal Access Token with `repo` scope on
          # handygtm-site, then add it as a secret here named SITE_DISPATCH_TOKEN.
          token: ${{ secrets.SITE_DISPATCH_TOKEN }}
          repository: REPLACE-ME/handygtm-site
          event-type: content-updated
